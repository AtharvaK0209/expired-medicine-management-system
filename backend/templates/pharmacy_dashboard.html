<!DOCTYPE html>
<html>
<head>
    <title>MediBridge | Pharmacy Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body>

<nav class="navbar navbar-dark bg-success">
  <div class="container">
    <a class="navbar-brand" href="/">MediBridge</a>
    <button class="btn btn-light" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container mt-5">

    <h2 class="text-success mb-4">Pharmacy Dashboard</h2>

    <div class="row">

        <div class="col-md-4">
            <div class="card custom-card p-4 text-center">
                <h5>Total Medicines</h5>
                <h3 id="total">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card custom-card p-4 text-center">
                <h5>Near Expiry</h5>
                <h3 id="near">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card custom-card p-4 text-center">
                <h5>Expired</h5>
                <h3 id="expired">0</h3>
            </div>
        </div>

    </div><div class="d-flex justify-content-between align-items-center mt-4 mb-3">

    <!-- Search Box -->
    <input
        type="text"
        id="searchMedicine"
        class="form-control w-50"
        placeholder="Search medicine..."
        onkeyup="searchMedicine()"
    >

    <!-- Add Medicine Button -->
    <button
        class="btn btn-success ms-3"
        data-bs-toggle="modal"
        data-bs-target="#addMedicineModal"
    >
        Add Medicine
    </button>



    <!-- ADD MEDICINE MODAL -->
<div class="modal fade" id="addMedicineModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Add Medicine</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="addMedicineForm">

          <input class="form-control mb-3" id="medicine_name" placeholder="Medicine Name" required>
          <input class="form-control mb-3" id="quantity" type="number" placeholder="Quantity" required>
          <input class="form-control mb-3" id="expiry_date" type="date" required>
          <input class="form-control mb-3" id="original_price" type="number" placeholder="Original Price" required>
          <input class="form-control mb-3" id="discount_price" type="number" placeholder="Discount Price" required>

          <button type="submit" class="btn btn-success w-100">Add</button>

        </form>
      </div>

    </div>
  </div>
</div>
</div>


<hr class="mt-5">
<div id="expiryAlert" class="mb-4"></div>
<h4 class="mt-4">Medicine Inventory</h4>

<table class="table table-bordered mt-3">
  <thead class="table-success">
    <tr>
      <th>Name</th>
      <th>Quantity</th>
      <th>Expiry Date</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="medicineTable">
  </tbody>
</table>
</div>

<script>
function logout(){
localStorage.clear();
window.location.href="/login-page";
}

document.getElementById("addMedicineForm").onsubmit = async function(e){
e.preventDefault();

let user_id = localStorage.getItem("user_id");

let res = await fetch("/add-medicine",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
medicine_name: medicine_name.value,
quantity: quantity.value,
expiry_date: expiry_date.value,
original_price: original_price.value,
discount_price: discount_price.value,
user_id: user_id
})
});

let data;

try {
    data = await res.json();
} catch {
    alert("Server error. Check Flask terminal.");
    return;
}

if(res.ok){
    alert(data.message);
    loadMedicines();
}else{
    alert(data.message);
}
}

async function loadMedicines(){

let user_id = localStorage.getItem("user_id");

let res = await fetch(`/get-medicines/${user_id}`);
let data = await res.json();

let table = document.getElementById("medicineTable");
table.innerHTML = "";

let total = 0;
let near = 0;
let expired = 0;

data.forEach(med => {

total++;

if(med.status === "NEAR_EXPIRY") near++;
if(med.status === "EXPIRED") expired++;

let statusBadge = "";

if(med.status === "SAFE"){
    statusBadge = `<span class="badge bg-success">SAFE</span>`;
}
else if(med.status === "NEAR_EXPIRY"){
    statusBadge = `<span class="badge bg-warning text-dark">NEAR EXPIRY</span>`;
}
else{
    statusBadge = `<span class="badge bg-danger">EXPIRED</span>`;
}

let deleteBtn = `<button class="btn btn-danger btn-sm" onclick="deleteMedicine(${med.medicine_id})">Delete</button>`;;

table.innerHTML += `
<tr>
<td>${med.medicine_name}</td>
<td>${med.quantity}</td>
<td>${med.expiry_date}</td>
<td>${statusBadge}</td>
<td>${deleteBtn}</td>
</tr>
`;
});

let alertBox = document.getElementById("expiryAlert");

alertBox.innerHTML = "";

if(expired > 0){
alertBox.innerHTML += `
<div class="alert alert-danger">
❌ ${expired} medicine(s) have expired. Please remove or dispose them.
</div>
`;
}

if(near > 0){
alertBox.innerHTML += `
<div class="alert alert-warning">
⚠ ${near} medicine(s) are near expiry. Consider redistribution or discount.
</div>
`;
}

document.getElementById("total").innerText = total;
document.getElementById("near").innerText = near;
document.getElementById("expired").innerText = expired;
}


loadMedicines();

async function deleteMedicine(id){

if(!confirm("Are you sure you want to delete this expired medicine?")) return;

await fetch(`/delete-medicine/${id}`, { method:"DELETE" });

loadMedicines();
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
