<!DOCTYPE html>
<html>
<head>
    <title>Register | MediBridge</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body>

<nav class="navbar navbar-dark bg-success">
  <div class="container">
    <a class="navbar-brand" href="/">MediBridge</a>
  </div>
</nav>

<div class="container mt-5">
    <div class="col-md-6 mx-auto">
        <div class="form-card">

            <h3 class="text-center text-success mb-4">Register</h3>

            <form id="registerForm">

                <input class="form-control mb-3" id="name" placeholder="Name" required>
                <input class="form-control mb-3" id="email" placeholder="Email" required>
                <input type="password" class="form-control mb-3" id="password" placeholder="Password" required>

                <select class="form-control mb-3" id="role">
                    <option value="pharmacy">Pharmacy</option>
                    <option value="ngo">NGO</option>
                </select>

                <input class="form-control mb-3" id="org_name" placeholder="Organization Name">
                <input class="form-control mb-3" id="address" placeholder="Address">
                <input class="form-control mb-3" id="contact" placeholder="Contact">

                <button type="submit" class="btn btn-success w-100">Register</button>
            </form>

        </div>
    </div>
</div>

<script>
document.getElementById("registerForm").onsubmit = async function(e){
e.preventDefault();

let res = await fetch("/register-page",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name: name.value,
email: email.value,
password: password.value,
role: role.value,
org_name: org_name.value,
address: address.value,
contact: contact.value
})
});

let data = await res.json();

alert(data.message);

if(res.ok){
window.location.href="/login-page";
}
}
</script>

</body>
</html>
